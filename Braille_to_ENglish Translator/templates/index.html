<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braille Decoder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }
        input[type="file"] {
            margin-bottom: 20px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        #output {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Braille Image Decoder</h2>
        <input type="file" id="brailleImage" accept="image/*">
        <button onclick="uploadImage()">Upload Image</button>
        <div id="output"></div>
    </div>

    <script>
        function uploadImage() {
            const fileInput = document.getElementById("brailleImage");
            const file = fileInput.files[0];

            if (!file) {
                alert("Please upload an image.");
                return;
            }

            const formData = new FormData();
            formData.append("image", file);

            fetch("/decode", {
                method: "POST",
                body: formData,
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("output").innerText = "Decoded English Text: " + data.text;
            })
            .catch(error => {
                console.error("Error:", error);
                document.getElementById("output").innerText = "An error occurred.";
            });
        }
    </script>
</body>
</html>
